program: src/train.py
method: random

metric:
  name: f1_score
  goal: maximize

run_cap: 120

parameters:

  dataset:
    value: mnist

  wandb_project:
    value: da6401_test

  loss:
    value: cross_entropy

  epochs:
    values: [5, 10]

  batch_size:
    values: [16, 32, 64]

  learning_rate:
    values: [0.001, 0.0001]

  weight_decay:
    values: [0.0, 0.0005, 0.5]

  optimizer:
    values: ["sgd", "momentum", "nag", "rmsprop", "adam", "nadam"]

  activation:
    values: ["sigmoid", "tanh", "relu"]

  weight_init:
    values: ["random", "xavier"]

  num_layers:
    values: [3, 4, 5]